name: E2E

# Run Playwright smoke tests on every push and PR. Covers the public
# surface only — auth-gated paths (dashboard, wizard, results) need a
# seeded Supabase workspace and are out of scope for this hermetic suite.
#
# We build a production bundle and serve it via `next start` rather than
# `next dev`, so the tests exercise the same artifact Vercel ships.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Build needs SOME value here or `next build` errors on the
      # missing-env check inside lib/supabase/client.ts. The values are
      # never hit during smoke tests (anon visitors only), so a stub URL
      # plus an anon key shaped like a real one is enough.
      NEXT_PUBLIC_SUPABASE_URL: https://stub.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: stub-anon-key
      SUPABASE_SERVICE_ROLE_KEY: stub-service-role-key
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Start production server
        run: npm start > server.log 2>&1 &
        env:
          PORT: 3000

      - name: Wait for server
        run: |
          for i in {1..60}; do
            if curl -sf http://localhost:3000/login -o /dev/null; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server did not start in 60s"
          cat server.log
          exit 1

      - name: Run Playwright tests
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
