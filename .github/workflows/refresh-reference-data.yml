name: Refresh reference data

# Runs once a year (Jan 15) plus manual trigger from the Actions tab.
# Two jobs:
#   1. fetch — runs each country's fetcher, writes updated SQL seed files,
#              opens a PR if anything changed.
#   2. apply — applies all current SQL seeds to the production Supabase DB.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   • SUPABASE_DATABASE_URL — Supabase pooler connection string
#       (Project Settings → Database → Connection string → "Transaction" mode)
#   • KOSIS_API_KEY (optional) — for KR live fetch from KOSIS Open API
#   • BLS_API_KEY (optional)   — for US live fetch from BLS API
#   Add more API keys here as fetchers come online.

on:
  schedule:
    - cron: '0 3 15 1 *'        # 03:00 UTC, January 15, annually
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'apply-only'
        type: choice
        options:
          - apply-only        # Just re-apply existing seeds (safe, idempotent)
          - fetch-and-pr      # Run fetchers, open PR with diffs (no DB write)
          - fetch-and-apply   # Run fetchers, write seeds, apply directly

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch:
    if: github.event.inputs.mode == 'fetch-and-pr' || github.event.inputs.mode == 'fetch-and-apply' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run fetchers
        env:
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        run: npm run fetch:reference
      - name: Open PR with seed updates
        if: github.event.inputs.mode != 'fetch-and-apply'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore(reference-data): annual refresh from public sources'
          branch: chore/refresh-reference-data
          title: 'Annual refresh of reference data'
          body: |
            Auto-generated by `.github/workflows/refresh-reference-data.yml`.

            Each country fetcher pulled current-year data from its public source
            and rewrote the corresponding `supabase/seeds/000X_<code>_*.sql` file.

            Review the diff to make sure currency conversions and profession
            mappings still look correct, then merge to apply.
      - name: Commit directly (fetch-and-apply mode)
        if: github.event.inputs.mode == 'fetch-and-apply'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add supabase/seeds/
          git diff --cached --quiet || git commit -m "chore(reference-data): annual refresh"
          git push

  apply:
    needs: [fetch]
    if: always() && (github.event.inputs.mode == 'apply-only' || github.event.inputs.mode == 'fetch-and-apply' || github.event_name == 'schedule')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Apply seeds to Supabase
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
        run: npm run sync:reference
