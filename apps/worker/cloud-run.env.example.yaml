# Cloud Run env vars — copy this file to cloud-run.env.yaml and fill in
# the secret values. The deploy script reads cloud-run.env.yaml; the
# .gitignore excludes that filename so secrets never leak into git.
#
# After filling in: ./apps/worker/deploy.sh
#
# To rotate any value, edit + re-run deploy.sh — gcloud applies the new
# vars to the next revision and traffic shifts automatically.

# ─── Worker bearer token ──────────────────────────────────────────────
# Shared secret between Vercel and Cloud Run. Generate with:
#   openssl rand -hex 32
# Then set the SAME value as WORKER_BEARER_TOKEN in Vercel project env vars.
WORKER_BEARER_TOKEN: ""

# ─── Self-URL (for keepalive ping during background orchestration) ───
# The worker pings $WORKER_SELF_URL/health every 5min while a long
# ensemble runs in the background, otherwise Cloud Run scales the
# instance down ~15min after the last incoming request and kills the
# in-flight orchestration. Set this AFTER first deploy, once you have
# the Cloud Run URL — then re-run deploy.sh / deploy.ps1.
WORKER_SELF_URL: ""

# ─── Supabase (service-role for DB writes) ────────────────────────────
NEXT_PUBLIC_SUPABASE_URL: ""
SUPABASE_SERVICE_ROLE_KEY: ""

# ─── LLM providers ────────────────────────────────────────────────────
# All required for full multi-provider deep tier. If any one is missing,
# only the corresponding sims fail (per-stage failover handles
# transient outages, but a missing key fails fast).
ANTHROPIC_API_KEY: ""
OPENAI_API_KEY: ""
DEEPSEEK_API_KEY: ""
# Optional — only used in deep_pro tier or if you swap a provider:
GOOGLE_GENERATIVE_AI_API_KEY: ""
XAI_API_KEY: ""

# ─── Market research grounding ────────────────────────────────────────
# Optional. Without it, persona prompts fall back to LLM-only intuition
# (no fresh web grounding). Worker logs "tavily ... 0 snippets" when
# absent — confirms it's a soft dependency.
TAVILY_API_KEY: ""

# Perplexity Sonar Pro — second-pass generative search grounding that
# runs in parallel with Tavily on the marketSize + categoryTrend stages.
# Added 2026-05-14 (defect #1 (b) fix) to surface non-English growth-
# trajectory narratives (EU K-Beauty +200% YoY, etc.) that Tavily's
# keyword retrieval underweights. Cost: ~+$0.03 per ensemble. Optional —
# leave blank to skip; the Tavily-only path stays valid.
PERPLEXITY_API_KEY: ""

# ─── Email notifications ──────────────────────────────────────────────
# Optional. Without it, ensemble-complete + sim-failed emails are
# skipped (logged but not sent). UI status updates still work.
RESEND_API_KEY: ""

# ─── Sim quality / cost knobs (optional overrides) ────────────────────
# These have sensible defaults baked into the runner; uncomment to
# override per-environment.
# LLM_ANTHROPIC_SIM_CONCURRENCY: "12"
# LLM_OPENAI_SIM_CONCURRENCY: "12"
# LLM_DEEPSEEK_SIM_CONCURRENCY: "12"
# LLM_GEMINI_SIM_CONCURRENCY: "4"
# LLM_PERSONA_BATCH_CONCURRENCY: "6"
# FREE_RERUN_CONFIDENCE_THRESHOLD: "60"

# ─── Sentry (optional) ────────────────────────────────────────────────
# If you want runtime errors from the worker to land in the same
# Sentry project as Vercel:
# SENTRY_DSN: ""

# ─── Cloud Run runtime metadata (auto-populated by GCP) ───────────────
# Don't fill these — Cloud Run injects them at runtime.
# K_SERVICE, K_REVISION, K_CONFIGURATION
# PORT (Cloud Run sets to 8080 by default)
